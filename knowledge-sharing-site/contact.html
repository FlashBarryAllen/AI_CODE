<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 知识分享网站</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="articles.html">文章</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="contact.html">联系</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h1>联系我们</h1>
            <p>如果您有任何问题、建议或合作意向，请随时通过以下方式与我联系。</p>
            
            <div class="contact-info">
                <h2>联系方式</h2>
                <ul>
                    <li>📧 邮箱: <a href="mailto:example@email.com">example@email.com</a></li>
                    <li>🐙 GitHub: <a href="https://github.com/your-profile" target="_blank">https://github.com/your-profile</a></li>
                    <li>💼 LinkedIn: <a href="https://linkedin.com/in/your-profile" target="_blank">https://linkedin.com/in/your-profile</a></li>
                    <li>🐦 Twitter: <a href="https://twitter.com/your-profile" target="_blank">https://twitter.com/your-profile</a></li>
                </ul>
            </div>
            
            <div class="contact-form">
                <h2>发送消息</h2>
                <form id="messageForm">
                    <div class="form-group">
                        <label for="name">姓名:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">邮箱:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="subject">主题:</label>
                        <input type="text" id="subject" name="subject" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="message">消息:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    
                    <button type="submit">发送消息</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 知识分享网站. 版权所有.</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('messageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('感谢您的消息！由于这是一个静态网站示例，实际的表单提交功能需要后端支持。');
            this.reset();
        });
    </script>
</body>
</html>
